<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login Page</h2>

<form method="post" action="/login">
    <div>
        <label>Username:</label>
        <input type="text" name="username"/>
    </div>

    <div>
        <label>Password:</label>
        <input type="password" name="password"/>
    </div>

    <button type="submit">Login</button>
</form>

</body>
</html>
